<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Bot - Vendas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b0f;
            --card: #12131a;
            --card2: #181922;
            --accent: #7c3aed;
            /* Purple for bot theme */
            --accent2: #9f1af0;
            --text: #e8e8e8;
            --text2: #8a8a9a;
            --green: #22c55e;
            --red: #ef4444;
            --border: #222233;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Login Gate */
        #login-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-box {
            background: var(--card);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        .login-box h1 {
            margin-bottom: 20px;
            color: var(--accent);
            font-size: 22px;
        }

        .login-box label {
            display: block;
            text-align: left;
            font-size: 13px;
            color: var(--text2);
            margin-bottom: 8px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: #fff;
            margin-bottom: 15px;
            outline: none;
        }

        .login-box input:focus {
            border-color: var(--accent);
        }

        .btn {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        }

        /* Main Dashboard */
        #app {
            display: none;
            padding: 40px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 i {
            color: var(--accent);
            margin-right: 10px;
        }

        .logout-btn {
            background: #333;
            width: auto;
            padding: 8px 16px;
            border-radius: 8px;
        }

        .section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
        }

        .section-title i {
            color: var(--accent);
        }

        .gen-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .gen-row input,
        .gen-row select {
            background: var(--card2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        .gen-row input:focus {
            border-color: var(--accent);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 10px;
        }

        th {
            text-align: left;
            padding: 12px;
            color: var(--text2);
            font-weight: 500;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            text-transform: uppercase;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            width: auto;
            display: inline-flex;
            border-radius: 6px;
        }

        .btn-red {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .btn-green {
            background: linear-gradient(135deg, #22c55e, #16a34a);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--card2);
            border: 1px solid var(--accent);
            color: var(--text);
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 13px;
            z-index: 2000;
            animation: slideUp 0.3s ease;
            display: none;
            align-items: center;
            gap: 8px;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <!-- LOGIN -->
    <div id="login-screen">
        <div class="login-box">
            <h1><i class="fas fa-robot"></i> Bot Vendas</h1>
            <p style="color:var(--text2);font-size:13px;margin-bottom:20px;">Acesso restrito ao catálogo de produtos do
                bot do Discord.</p>
            <label>Token de Administrador</label>
            <input type="password" id="adminToken" placeholder="Digite a chave da API...">
            <button class="btn" onclick="login()"><i class="fas fa-sign-in-alt"></i> Acessar Painel</button>
        </div>
    </div>

    <!-- PANEL -->
    <div id="app">
        <div class="header">
            <h1><i class="fas fa-robot"></i> Dashboard Bots</h1>
            <button class="btn logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
        </div>

        <div class="section" id="bot-config-section">
            <div class="section-title"><i class="fas fa-cogs"></i> Configurações do Bot</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                <div>
                    <label style="font-size:12px;color:var(--text2);">Token do Bot</label>
                    <input type="password" id="c_token" placeholder="MTEyMz..." class="cfg-input"
                        style="width:100%; padding:10px; background:var(--card2); border:1px solid var(--border); border-radius:6px; color:#fff;">
                </div>
                <div>
                    <label style="font-size:12px;color:var(--text2);">Prefixo</label>
                    <input type="text" id="c_prefix" placeholder="!" class="cfg-input"
                        style="width:100%; padding:10px; background:var(--card2); border:1px solid var(--border); border-radius:6px; color:#fff;">
                </div>
                <div>
                    <label style="font-size:12px;color:var(--text2);">ID Canal de Vendas</label>
                    <input type="text" id="c_sales" placeholder="123456789..." class="cfg-input"
                        style="width:100%; padding:10px; background:var(--card2); border:1px solid var(--border); border-radius:6px; color:#fff;">
                </div>
                <div>
                    <label style="font-size:12px;color:var(--text2);">ID Canal Logs (Recibos)</label>
                    <input type="text" id="c_logs" placeholder="123456789..." class="cfg-input"
                        style="width:100%; padding:10px; background:var(--card2); border:1px solid var(--border); border-radius:6px; color:#fff;">
                </div>
            </div>
            <label style="font-size:12px;color:var(--text2);">Mensagem Automática (Privado do Cliente)</label>
            <p style="font-size:11px;color:var(--accent);margin-bottom:5px;">Use {produto} para indicar onde o estoque
                aparecerá.</p>
            <textarea id="c_msg" rows="4"
                style="width:100%; padding:10px; background:var(--card2); border:1px solid var(--border); border-radius:6px; color:#fff; resize:vertical; margin-bottom:15px; font-family:inherit;"></textarea>

            <button class="btn btn-green" onclick="saveBotConfig()" style="width:auto;"><i class="fas fa-save"></i>
                Salvar Configurações Globais</button>
        </div>

        <div class="section">
            <div class="section-title"><i class="fas fa-plus"></i> Adicionar Produto (Estoque por Linhas)</div>
            <div class="gen-row" style="align-items:flex-start;">
                <div style="flex:2; display:flex; flex-direction:column; gap:10px;">
                    <input type="text" id="p_name" placeholder="Nome do Produto">
                    <input type="text" id="p_desc" placeholder="Descrição (Opcional)">
                    <input type="number" id="p_price" placeholder="Valor (Ex: 0.52)" step="0.01">
                </div>
                <div style="flex:3; display:flex; flex-direction:column; gap:10px; height:100%;">
                    <textarea id="p_stock"
                        placeholder="Cole aqui o estoque.\nCada quebra de linha será considerada 1 unidade do produto!\nEx:\nlogin1:senha1\nlogin2:senha2"
                        style="width:100%; height:110px; padding:10px; background:var(--card2); border:1px solid var(--border); border-radius:6px; color:#fff; resize:vertical; font-family:inherit;"></textarea>
                </div>
            </div>
            <button class="btn btn-sm btn-green" onclick="createProduct()" style="margin-top:5px;"><i
                    class="fas fa-cart-plus"></i> Criar Produto</button>
        </div>

        <div class="section">
            <div class="section-title"><i class="fas fa-box-open"></i> Catálogo do Bot</div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Descrição</th>
                        <th>Valor (R$)</th>
                        <th>Quantidade</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="products-tbody">
                    <!-- Products will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"><i class="fas fa-check-circle" style="color:var(--green)"></i><span
            id="toast-msg">Sucesso!</span></div>

    <script>
        const API_PROD = '/api/admin/products';
        const API_CFG = '/api/admin/botconfig';
        let token = localStorage.getItem('bot_admin_token') || '';

        if (token) {
            loginWithToken(token);
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.querySelector('i').className = isError ? 'fas fa-times-circle' : 'fas fa-check-circle';
            toast.querySelector('i').style.color = isError ? 'var(--red)' : 'var(--green)';
            toast.style.borderColor = isError ? 'var(--red)' : 'var(--accent)';
            toast.style.display = 'flex';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        async function login() {
            const val = document.getElementById('adminToken').value;
            if (!val) return;
            await loginWithToken(val);
        }

        async function loginWithToken(t) {
            try {
                // Check auth by fetching config
                const res = await fetch(API_CFG, { headers: { 'x-admin-token': t } });
                const data = await res.json();

                if (data.success) {
                    token = t;
                    localStorage.setItem('bot_admin_token', t);
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('app').style.display = 'block';

                    fillConfig(data.config);
                    await loadProducts();
                } else {
                    showToast('Token inválido ou não autorizado', true);
                    localStorage.removeItem('bot_admin_token');
                }
            } catch (e) {
                showToast('Erro de conexão', true);
            }
        }

        function logout() {
            localStorage.removeItem('bot_admin_token');
            token = '';
            document.getElementById('app').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
        }

        function fillConfig(cfg) {
            document.getElementById('c_token').value = cfg.bot_token || '';
            document.getElementById('c_prefix').value = cfg.prefix || '!';
            document.getElementById('c_sales').value = cfg.sales_channel_id || '';
            document.getElementById('c_logs').value = cfg.log_channel_id || '';
            document.getElementById('c_msg').value = cfg.dm_message_template || '';
        }

        async function saveBotConfig() {
            const payload = {
                bot_token: document.getElementById('c_token').value,
                prefix: document.getElementById('c_prefix').value,
                sales_channel_id: document.getElementById('c_sales').value,
                log_channel_id: document.getElementById('c_logs').value,
                dm_message_template: document.getElementById('c_msg').value
            };

            try {
                const res = await fetch(API_CFG, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-admin-token': token },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) showToast('Configurações Salvas com Sucesso!');
                else showToast('Erro ao salvar', true);
            } catch (e) { showToast('Erro interno', true); }
        }

        async function loadProducts() {
            try {
                const res = await fetch(API_PROD, { headers: { 'x-admin-token': token } });
                const data = await res.json();
                if (data.success) renderTable(data.products);
            } catch (e) { showToast('Erro ao carregar produtos', true); }
        }

        function renderTable(products) {
            const tbody = document.getElementById('products-tbody');
            tbody.innerHTML = '';

            products.forEach(p => {
                const tr = document.createElement('tr');
                const qty = p.stock_items ? p.stock_items.length : 0;
                const itemsRaw = p.stock_items ? p.stock_items.join('\\n').replace(/'/g, "\\'") : '';

                tr.innerHTML = `
          <td>#${p.id}</td>
          <td><strong>${p.name}</strong></td>
          <td>${p.description || '-'}</td>
          <td style="color:var(--green);font-weight:600;">R$ ${p.price.toFixed(2)}</td>
          <td><span style="background:var(--card2);padding:4px 8px;border-radius:4px;border:1px solid var(--border);">${qty} uns</span></td>
          <td>
            <button class="btn btn-sm btn-green" onclick="editProductPrompt(${p.id}, '${p.name}', '${p.description}', ${p.price}, '${itemsRaw}')" style="margin-right:5px;"><i class="fas fa-edit"></i> Editar Estoque</button>
            <button class="btn btn-sm btn-red" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button>
          </td>
        `;
                tbody.appendChild(tr);
            });
            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text2)">Nenhum produto cadastrado no catálogo.</td></tr>';
            }
        }

        async function createProduct() {
            const name = document.getElementById('p_name').value;
            const desc = document.getElementById('p_desc').value;
            const price = document.getElementById('p_price').value;
            const stockRaw = document.getElementById('p_stock').value;

            if (!name || !price) return showToast('Preencha Nome e Valor!', true);

            const stockArray = stockRaw.split('\\n').map(s => s.trim()).filter(s => s !== '');

            try {
                const res = await fetch(API_PROD, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-admin-token': token },
                    body: JSON.stringify({ name, description: desc, price, stock_items: stockArray })
                });
                const data = await res.json();
                if (data.success) {
                    showToast('Produto adicionado ao catálogo!');
                    loadProducts();
                    document.getElementById('p_name').value = '';
                    document.getElementById('p_desc').value = '';
                    document.getElementById('p_price').value = '';
                    document.getElementById('p_stock').value = '';
                } else showToast(data.message, true);
            } catch (e) { showToast('Erro interno', true); }
        }

        async function editProductPrompt(id, name, desc, price, rawItems) {
            const newStockInput = prompt('Edite as linhas do estoque (Separe por vírgula no prompt ou cole múltiplo):', rawItems.replace(/\\n/g, ', '));
            if (newStockInput === null) return;

            // Allow comma or newline split from simple prompt
            let stockArray = [];
            if (newStockInput.trim() !== "") {
                if (newStockInput.includes(',')) {
                    stockArray = newStockInput.split(',').map(s => s.trim()).filter(s => s !== '');
                } else {
                    stockArray = newStockInput.split('\\n').map(s => s.trim()).filter(s => s !== '');
                }
            }

            try {
                const res = await fetch(`${API_PROD}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'x-admin-token': token },
                    body: JSON.stringify({ name, description: desc, price, stock_items: stockArray })
                });
                const data = await res.json();
                if (data.success) {
                    showToast('Estoque atualizado com Sucesso!');
                    loadProducts();
                } else showToast(data.message, true);
            } catch (e) { showToast('Erro interno', true); }
        }

        async function deleteProduct(id) {
            if (!confirm('Tem certeza que deseja apagar este produto do Bot?')) return;
            try {
                const res = await fetch(`${API_PROD}/${id}`, {
                    method: 'DELETE',
                    headers: { 'x-admin-token': token }
                });
                const data = await res.json();
                if (data.success) {
                    showToast('Produto excluído!');
                    loadProducts();
                } else showToast(data.message, true);
            } catch (e) { showToast('Erro interno', true); }
        }
    </script>
</body>

</html>
